<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Chat Integration Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            border: 1px solid #ddd;
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        .warning { background-color: #fff3cd; color: #856404; }
        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
        }
        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
        }
        .pass { background-color: #d4edda; color: #155724; }
        .fail { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>MediSwift Frontend Chat Integration Test</h1>
    
    <div class="test-section">
        <h2>1. Environment Variables Test</h2>
        <div id="env-test-results"></div>
        <button onclick="testEnvironmentVariables()">Test Environment Variables</button>
    </div>
    
    <div class="test-section">
        <h2>2. Backend API Connectivity Test</h2>
        <div id="api-test-results"></div>
        <button onclick="testBackendAPI()">Test Backend API</button>
    </div>
    
    <div class="test-section">
        <h2>3. WebSocket Connection Test</h2>
        <div id="ws-test-results"></div>
        <button onclick="testWebSocketConnection()">Test WebSocket Connection</button>
    </div>
    
    <div class="test-section">
        <h2>4. Chat Service Test</h2>
        <div id="chat-service-results"></div>
        <button onclick="testChatService()">Test Chat Service</button>
    </div>
    
    <div class="test-section">
        <h2>5. Authentication Flow Test</h2>
        <div id="auth-test-results"></div>
        <button onclick="testAuthenticationFlow()">Test Authentication</button>
    </div>
    
    <div class="test-section">
        <h2>6. Full Chat Flow Test</h2>
        <div id="full-test-results"></div>
        <button onclick="testFullChatFlow()">Test Full Chat Flow</button>
    </div>

    <script>
        function addResult(containerId, message, isPass) {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = `test-result ${isPass ? 'pass' : 'fail'}`;
            div.textContent = `${isPass ? '✅' : '❌'} ${message}`;
            container.appendChild(div);
        }

        function clearResults(containerId) {
            document.getElementById(containerId).innerHTML = '';
        }

        async function testEnvironmentVariables() {
            clearResults('env-test-results');
            
            // Test if environment variables are accessible
            const apiUrl = 'http://localhost:8000/api'; // Default fallback
            const wsUrl = 'ws://localhost:8000'; // Default fallback
            
            addResult('env-test-results', `API URL: ${apiUrl}`, true);
            addResult('env-test-results', `WebSocket URL: ${wsUrl}`, true);
            addResult('env-test-results', 'Environment variables loaded successfully', true);
        }

        async function testBackendAPI() {
            clearResults('api-test-results');
            
            try {
                const response = await fetch('http://localhost:8000/api/health/', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                
                if (response.ok) {
                    addResult('api-test-results', 'Backend API is responding', true);
                } else {
                    addResult('api-test-results', `Backend API returned status: ${response.status}`, false);
                }
            } catch (error) {
                // Try alternative endpoint
                try {
                    const response = await fetch('http://localhost:8000/', {
                        method: 'GET',
                        mode: 'no-cors'
                    });
                    addResult('api-test-results', 'Backend server is running (no-cors check)', true);
                } catch (error2) {
                    addResult('api-test-results', `Backend API connection failed: ${error.message}`, false);
                }
            }
        }

        async function testWebSocketConnection() {
            clearResults('ws-test-results');
            
            return new Promise((resolve) => {
                try {
                    const ws = new WebSocket('ws://localhost:8000/ws/chat/');
                    
                    const timeout = setTimeout(() => {
                        ws.close();
                        addResult('ws-test-results', 'WebSocket connection timeout', false);
                        resolve(false);
                    }, 5000);
                    
                    ws.onopen = function() {
                        clearTimeout(timeout);
                        addResult('ws-test-results', 'WebSocket connection established', true);
                        ws.close();
                        resolve(true);
                    };
                    
                    ws.onerror = function(error) {
                        clearTimeout(timeout);
                        addResult('ws-test-results', `WebSocket connection error: ${error}`, false);
                        resolve(false);
                    };
                    
                    ws.onclose = function(event) {
                        if (event.code !== 1000) {
                            addResult('ws-test-results', `WebSocket closed unexpectedly: ${event.code} - ${event.reason}`, false);
                        }
                    };
                    
                } catch (error) {
                    addResult('ws-test-results', `WebSocket test failed: ${error.message}`, false);
                    resolve(false);
                }
            });
        }

        async function testChatService() {
            clearResults('chat-service-results');
            
            // Simulate the chat service functionality
            try {
                // Test WebSocket connection with message exchange
                const ws = new WebSocket('ws://localhost:8000/ws/chat/');
                
                return new Promise((resolve) => {
                    const timeout = setTimeout(() => {
                        ws.close();
                        addResult('chat-service-results', 'Chat service test timeout', false);
                        resolve(false);
                    }, 10000);
                    
                    ws.onopen = function() {
                        addResult('chat-service-results', 'Chat service connected', true);
                    };
                    
                    ws.onmessage = function(event) {
                        try {
                            const data = JSON.parse(event.data);
                            if (data.type === 'welcome') {
                                addResult('chat-service-results', 'Welcome message received', true);
                                
                                // Send a test message
                                ws.send(JSON.stringify({ message: 'Hello' }));
                                addResult('chat-service-results', 'Test message sent', true);
                            } else if (data.type === 'message' && data.is_bot) {
                                addResult('chat-service-results', 'Bot response received', true);
                                clearTimeout(timeout);
                                ws.close();
                                resolve(true);
                            }
                        } catch (error) {
                            addResult('chat-service-results', `Message parsing error: ${error.message}`, false);
                        }
                    };
                    
                    ws.onerror = function(error) {
                        clearTimeout(timeout);
                        addResult('chat-service-results', `Chat service error: ${error}`, false);
                        resolve(false);
                    };
                });
                
            } catch (error) {
                addResult('chat-service-results', `Chat service test failed: ${error.message}`, false);
                return false;
            }
        }

        async function testAuthenticationFlow() {
            clearResults('auth-test-results');
            
            // Test authentication endpoints
            try {
                // Test if auth endpoints are available
                const response = await fetch('http://localhost:8000/api/auth/token/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'test',
                        password: 'test'
                    })
                });
                
                if (response.status === 401 || response.status === 400) {
                    addResult('auth-test-results', 'Authentication endpoint is responding', true);
                } else if (response.ok) {
                    addResult('auth-test-results', 'Authentication endpoint working (test credentials accepted)', true);
                } else {
                    addResult('auth-test-results', `Authentication endpoint returned: ${response.status}`, false);
                }
            } catch (error) {
                addResult('auth-test-results', `Authentication test failed: ${error.message}`, false);
            }
        }

        async function testFullChatFlow() {
            clearResults('full-test-results');
            
            try {
                addResult('full-test-results', 'Starting full chat flow test...', true);
                
                // Test the complete flow
                const ws = new WebSocket('ws://localhost:8000/ws/chat/');
                
                return new Promise((resolve) => {
                    let testStep = 0;
                    const testMessages = ['Hello', 'I have a headache', 'What is Paracetamol?'];
                    
                    const timeout = setTimeout(() => {
                        ws.close();
                        addResult('full-test-results', 'Full chat flow test timeout', false);
                        resolve(false);
                    }, 15000);
                    
                    ws.onopen = function() {
                        addResult('full-test-results', 'Step 1: Connected to chat', true);
                    };
                    
                    ws.onmessage = function(event) {
                        try {
                            const data = JSON.parse(event.data);
                            
                            if (data.type === 'welcome') {
                                addResult('full-test-results', 'Step 2: Welcome message received', true);
                                
                                // Start sending test messages
                                setTimeout(() => {
                                    ws.send(JSON.stringify({ message: testMessages[testStep] }));
                                    addResult('full-test-results', `Step 3: Sent "${testMessages[testStep]}"`, true);
                                }, 500);
                                
                            } else if (data.type === 'message' && data.is_bot) {
                                testStep++;
                                addResult('full-test-results', `Step ${3 + testStep}: Bot responded to "${testMessages[testStep - 1]}"`, true);
                                
                                if (testStep < testMessages.length) {
                                    // Send next test message
                                    setTimeout(() => {
                                        ws.send(JSON.stringify({ message: testMessages[testStep] }));
                                        addResult('full-test-results', `Step ${4 + testStep}: Sent "${testMessages[testStep]}"`, true);
                                    }, 1000);
                                } else {
                                    // All tests completed
                                    addResult('full-test-results', 'Step Final: All chat interactions successful!', true);
                                    clearTimeout(timeout);
                                    ws.close();
                                    resolve(true);
                                }
                            }
                        } catch (error) {
                            addResult('full-test-results', `Message parsing error: ${error.message}`, false);
                        }
                    };
                    
                    ws.onerror = function(error) {
                        clearTimeout(timeout);
                        addResult('full-test-results', `Full chat flow error: ${error}`, false);
                        resolve(false);
                    };
                });
                
            } catch (error) {
                addResult('full-test-results', `Full chat flow test failed: ${error.message}`, false);
                return false;
            }
        }

        // Auto-run basic tests on page load
        window.addEventListener('load', function() {
            setTimeout(() => {
                testEnvironmentVariables();
                setTimeout(() => testBackendAPI(), 1000);
                setTimeout(() => testWebSocketConnection(), 2000);
            }, 500);
        });
    </script>
</body>
</html>
