services:
  # Frontend service
  - type: web
    name: mediswift-frontend
    env: static
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: mediswift-backend
          type: web
          property: url
        value: https://backend-url-placeholder/api  # Placeholder that will be overridden
      - key: VITE_APP_URL
        value: https://mediswift-io.onrender.com
      - key: VITE_APP_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend service
  - type: web
    name: mediswift-backend
    env: python
    region: ohio
    buildCommand: >
      pip install -r backend/requirements.txt &&
      cd backend &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: cd backend && gunicorn mediswift_backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: FRONTEND_URL
        value: https://mediswift-io.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: mediswift-db
          property: connectionString

databases:
  - name: mediswift-db
    databaseName: mediswift
    user: mediswift
    plan: free 